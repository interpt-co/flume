apiVersion: v1
kind: Service
metadata:
  name: {{ include "flume.fullname" . }}-dispatcher
  labels:
    {{- include "flume.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "flume.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
