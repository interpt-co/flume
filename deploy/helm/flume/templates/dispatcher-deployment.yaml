apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flume.fullname" . }}-dispatcher
  labels:
    {{- include "flume.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
spec:
  replicas: {{ .Values.dispatcher.replicas }}
  selector:
    matchLabels:
      {{- include "flume.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dispatcher
  template:
    metadata:
      labels:
        {{- include "flume.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dispatcher
    spec:
      containers:
        - name: dispatcher
          image: "{{ .Values.image.repository }}:{{ include "flume.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - dispatcher
            - --port
            - "{{ .Values.dispatcher.port }}"
            - --redis-addr
            - "{{ .Values.redis.addr }}"
            {{- if .Values.redis.password }}
            - --redis-password
            - "{{ .Values.redis.password }}"
            {{- end }}
            {{- if .Values.redis.db }}
            - --redis-db
            - "{{ .Values.redis.db }}"
            {{- end }}
            - --bulk-window-ms
            - "{{ .Values.dispatcher.bulkWindowMS }}"
            {{- if .Values.s3.enabled }}
            - --s3-bucket
            - "{{ .Values.s3.bucket }}"
            - --s3-prefix
            - "{{ .Values.s3.prefix }}"
            - --s3-region
            - "{{ .Values.s3.region }}"
            {{- if .Values.s3.endpoint }}
            - --s3-endpoint
            - "{{ .Values.s3.endpoint }}"
            {{- end }}
            {{- end }}
            {{- if .Values.dispatcher.authUrl }}
            - --auth-url
            - "{{ .Values.dispatcher.authUrl }}"
            - --auth-timeout
            - "{{ .Values.dispatcher.authTimeout }}"
            {{- end }}
            {{- if .Values.dispatcher.verbose }}
            - --verbose
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.dispatcher.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.dispatcher.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
