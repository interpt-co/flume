apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flume.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flume.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "flume.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flume.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "flume.serviceAccountName" . }}
      containers:
        - name: flume
          image: "{{ .Values.image.repository }}:{{ include "flume.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /flume
            - forward
            - "--listen=:{{ .Values.service.forwardPort }}"
          envFrom:
            - configMapRef:
                name: {{ include "flume.fullname" . }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: forward
              containerPort: {{ .Values.service.forwardPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
