image:
  repository: interpt/flume
  tag: ""
  pullPolicy: IfNotPresent

collector:
  logDir: /var/log/containers
  bufferSize: 10000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  tolerations: []
  nodeSelector: {}

dispatcher:
  replicas: 2
  port: 8080
  bulkWindowMS: 100
  verbose: false
  authUrl: ""
  authTimeout: "5s"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  addr: "redis:6379"
  password: ""
  db: ""
  tls: false

s3:
  enabled: false
  bucket: ""
  prefix: flume
  region: ""
  endpoint: ""
  flushInterval: 10s
  flushCount: 1000
  retention: 168h

patterns:
  - name: all
    selector:
      matchLabels: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
