syntax = "proto3";

package flume.v1;

option go_package = "github.com/interpt-co/flume/api/proto/flume/v1;flumev1";

import "google/protobuf/timestamp.proto";

service CollectorService {
  rpc StreamLogs(stream CollectorMessage) returns (stream AggregatorMessage);
}

message CollectorMessage {
  oneof msg {
    Handshake handshake = 1;
    LogBatch log_batch = 2;
    Heartbeat heartbeat = 3;
  }
}

message Handshake {
  string node_name = 1;
  string pattern_name = 2;
}

message LogBatch {
  repeated LogEntry entries = 1;
  uint64 sequence = 2;
}

message LogEntry {
  string id = 1;
  string content = 2;
  bytes json_content = 3;
  bool is_json = 4;
  google.protobuf.Timestamp timestamp = 5;
  string level = 6;
  map<string, string> labels = 7;
  string namespace = 10;
  string pod = 11;
  string container = 12;
  string node_name = 13;
}

message Heartbeat {}

message AggregatorMessage {
  oneof msg {
    Ack ack = 1;
    BackPressure backpressure = 2;
  }
}

message Ack {
  uint64 sequence = 1;
}

message BackPressure {
  bool pause = 1;
}
